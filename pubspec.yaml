name: valet_parking_app
description: A modern valet parking application with real-time tracking and booking.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_maps_flutter: ^2.6.0
  google_maps_flutter_web: ^0.5.14+3
  geolocator: ^10.1.0
  intl: ^0.19.0
  provider: ^6.0.0
  http: ^1.1.0
  uuid: ^4.0.0
  lottie: ^2.4.0
  dotted_line: ^3.0.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.1.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
